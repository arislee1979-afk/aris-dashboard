<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aris Gym Training Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500&display=swap');

:root {
  --bg-dark: #0a0e1a;
  --bg-card: #151b2e;
  --bg-input: #1a2332;
  --accent-cyan: #00fff5;
  --accent-purple: #9d4edd;
  --accent-pink: #ff006e;
  --text-primary: #e8f4f8;
  --text-secondary: #8b9cb6;
  --border: rgba(0, 255, 245, 0.2);
  --glow: 0 0 20px rgba(0, 255, 245, 0.3);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f3a 100%);
  color: var(--text-primary);
  font-family: 'Roboto Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 3rem;
  position: relative;
}

.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 3.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  animation: glow-pulse 3s ease-in-out infinite;
  margin-bottom: 0.5rem;
}

@keyframes glow-pulse {
  0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 245, 0.5)); }
  50% { filter: drop-shadow(0 0 20px rgba(157, 78, 221, 0.8)); }
}

.header p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
}

/* Data Input Section */
.data-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: var(--glow);
}

.data-input h2 {
  font-family: 'Orbitron', sans-serif;
  color: var(--accent-cyan);
  margin-bottom: 1rem;
  font-size: 1.3rem;
}

.csv-input {
  width: 100%;
  min-height: 200px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  color: var(--text-primary);
  font-family: 'Roboto Mono', monospace;
  font-size: 0.85rem;
  resize: vertical;
  margin-bottom: 1rem;
}

.csv-input::placeholder {
  color: var(--text-secondary);
}

.button-group {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.btn {
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: 6px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  color: var(--bg-dark);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0, 255, 245, 0.5);
}

.btn-secondary {
  background: var(--bg-input);
  border: 1px solid var(--accent-purple);
  color: var(--accent-purple);
}

.btn-secondary:hover {
  background: var(--accent-purple);
  color: var(--text-primary);
}

.btn-danger {
  background: var(--bg-input);
  border: 1px solid var(--accent-pink);
  color: var(--accent-pink);
}

.btn-danger:hover {
  background: var(--accent-pink);
  color: var(--text-primary);
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
}

.stat-card h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.75rem;
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--accent-cyan);
  line-height: 1;
}

.stat-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 0.5rem;
}

/* Charts */
.chart-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  margin-bottom: 2rem;
}

.chart-section h2 {
  font-family: 'Orbitron', sans-serif;
  color: var(--accent-purple);
  margin-bottom: 1.5rem;
  font-size: 1.3rem;
}

.chart-container {
  position: relative;
  height: 300px;
  margin-bottom: 2rem;
}

.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-secondary);
}

.empty-state-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.empty-state p {
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
}

.empty-state small {
  font-size: 0.85rem;
  opacity: 0.7;
}

/* Responsive */
@media (max-width: 768px) {
  .header h1 {
    font-size: 2rem;
  }
  
  .stats-grid {
    grid-template-columns: 1fr;
  }
  
  .button-group {
    flex-direction: column;
  }
  
  .btn {
    width: 100%;
  }
}

/* Loading Animation */
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-cyan);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🦞 Aris Training Hub</h1>
    <p>Power Analytics · Track Progress · Dominate Goals</p>
  </div>

  <!-- Data Input Section -->
  <div class="data-input">
    <h2>📊 資料輸入</h2>
    <textarea 
      id="csvInput" 
      class="csv-input" 
      placeholder="貼上你的訓練 CSV 資料...

格式範例：
date,training,category,sub_category,sets,reps,max_weight_kg,volume_kg
2026-01-08,PPL-push,BENCH_PRESS,BARBELL_BENCH_PRESS,3,20,60,1200
2026-01-08,PPL-push,SHOULDER_PRESS,DUMBBELL_SHOULDER_PRESS,2,20,14,280

或連結你的 API endpoint..."
    ></textarea>
    
    <div class="button-group">
      <button class="btn btn-primary" onclick="loadData()">🚀 載入資料</button>
      <button class="btn btn-secondary" onclick="appendData()">➕ 追加資料</button>
      <button class="btn btn-secondary" onclick="exportData()">💾 匯出 CSV</button>
      <button class="btn btn-danger" onclick="clearData()">🗑 清除全部</button>
    </div>
  </div>

  <!-- Stats Overview -->
  <div class="stats-grid">
    <div class="stat-card">
      <h3>總訓練次數</h3>
      <div class="stat-value" id="totalSessions">--</div>
      <div class="stat-label">sessions</div>
    </div>
    
    <div class="stat-card">
      <h3>週均訓練頻率</h3>
      <div class="stat-value" id="weeklyFreq">--</div>
      <div class="stat-label">sessions/week</div>
    </div>
    
    <div class="stat-card">
      <h3>總訓練量</h3>
      <div class="stat-value" id="totalVolume">--</div>
      <div class="stat-label">kg</div>
    </div>
    
    <div class="stat-card">
      <h3>最後訓練日期</h3>
      <div class="stat-value" id="lastDate" style="font-size: 1.5rem;">--</div>
      <div class="stat-label" id="daysSince">-- days ago</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-section">
    <h2>📈 訓練頻率趨勢</h2>
    <div class="chart-container">
      <canvas id="frequencyChart"></canvas>
      <div class="empty-state" id="emptyFreq">
        <div class="empty-state-icon">📊</div>
        <p>等待資料載入...</p>
        <small>貼上你的訓練 CSV 或連結 API endpoint</small>
      </div>
    </div>
  </div>

  <div class="chart-section">
    <h2>💪 訓練量分析</h2>
    <div class="chart-container">
      <canvas id="volumeChart"></canvas>
      <div class="empty-state" id="emptyVolume">
        <div class="empty-state-icon">💪</div>
        <p>等待資料載入...</p>
        <small>載入資料後即可看到訓練量趨勢</small>
      </div>
    </div>
  </div>

  <div class="chart-section">
    <h2>🎯 肌群訓練組數</h2>
    <div class="chart-container">
      <canvas id="muscleChart"></canvas>
      <div class="empty-state" id="emptyMuscle">
        <div class="empty-state-icon">🎯</div>
        <p>等待資料載入...</p>
        <small>分析各肌群的訓練組數分布</small>
      </div>
    </div>
  </div>
</div>

<script>
// Global data store
let trainingData = [];
let charts = {};

// Parse CSV
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  
  // Skip header if present
  const hasHeader = lines[0].toLowerCase().includes('date');
  const dataLines = hasHeader ? lines.slice(1) : lines;
  
  return dataLines.map(line => {
    const parts = line.split(',');
    if (parts.length < 8) return null;
    return {
      date: parts[0].trim(),
      training: parts[1].trim(),
      category: parts[2].trim(),
      sub_category: parts[3].trim(),
      sets: parseInt(parts[4]),
      reps: parseInt(parts[5]),
      weight: parseFloat(parts[6]),
      volume: parseFloat(parts[7])
    };
  }).filter(d => d !== null);
}

// Load data
function loadData() {
  const csvText = document.getElementById('csvInput').value.trim();
  if (!csvText) {
    alert('請貼上 CSV 資料');
    return;
  }
  
  const parsed = parseCSV(csvText);
  if (parsed.length === 0) {
    alert('資料格式錯誤');
    return;
  }
  
  trainingData = parsed;
  localStorage.setItem('gymData', JSON.stringify(trainingData));
  updateDashboard();
  alert(`✅ 已載入 ${parsed.length} 筆資料`);
}

// Append data
function appendData() {
  const csvText = document.getElementById('csvInput').value.trim();
  if (!csvText) {
    alert('請貼上要追加的 CSV 資料');
    return;
  }
  
  const parsed = parseCSV(csvText);
  if (parsed.length === 0) {
    alert('資料格式錯誤');
    return;
  }
  
  trainingData = [...trainingData, ...parsed];
  // Remove duplicates
  const seen = new Set();
  trainingData = trainingData.filter(d => {
    const key = `${d.date}-${d.category}-${d.sub_category}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  
  localStorage.setItem('gymData', JSON.stringify(trainingData));
  updateDashboard();
  alert(`✅ 已追加資料，總共 ${trainingData.length} 筆`);
}

// Export data
function exportData() {
  if (trainingData.length === 0) {
    alert('沒有資料可匯出');
    return;
  }
  
  const csv = ['date,training,category,sub_category,sets,reps,max_weight_kg,volume_kg'];
  trainingData.forEach(d => {
    csv.push(`${d.date},${d.training},${d.category},${d.sub_category},${d.sets},${d.reps},${d.weight},${d.volume}`);
  });
  
  const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gym_data_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Clear data
function clearData() {
  if (!confirm('確定要清除全部資料？')) return;
  
  trainingData = [];
  localStorage.removeItem('gymData');
  updateDashboard();
  alert('✅ 已清除全部資料');
}

// Update dashboard
function updateDashboard() {
  if (trainingData.length === 0) {
    // Show empty states
    document.querySelectorAll('.empty-state').forEach(el => el.style.display = 'block');
    document.querySelectorAll('canvas').forEach(el => el.style.display = 'none');
    
    document.getElementById('totalSessions').textContent = '--';
    document.getElementById('weeklyFreq').textContent = '--';
    document.getElementById('totalVolume').textContent = '--';
    document.getElementById('lastDate').textContent = '--';
    document.getElementById('daysSince').textContent = '-- days ago';
    return;
  }
  
  // Hide empty states
  document.querySelectorAll('.empty-state').forEach(el => el.style.display = 'none');
  document.querySelectorAll('canvas').forEach(el => el.style.display = 'block');
  
  // Calculate stats
  const dates = [...new Set(trainingData.map(d => d.date))].sort();
  const lastDate = dates[dates.length - 1];
  const firstDate = dates[0];
  const totalDays = Math.ceil((new Date(lastDate) - new Date(firstDate)) / 86400000) + 1;
  const daysSince = Math.floor((new Date() - new Date(lastDate)) / 86400000);
  
  const sessions = {};
  trainingData.forEach(d => {
    const key = d.date + '|' + d.training;
    sessions[key] = true;
  });
  const totalSessions = Object.keys(sessions).length;
  const weeklyFreq = (totalSessions / (totalDays / 7)).toFixed(1);
  const totalVolume = trainingData.reduce((sum, d) => sum + d.volume, 0);
  
  document.getElementById('totalSessions').textContent = totalSessions;
  document.getElementById('weeklyFreq').textContent = weeklyFreq;
  document.getElementById('totalVolume').textContent = Math.round(totalVolume).toLocaleString();
  document.getElementById('lastDate').textContent = lastDate;
  document.getElementById('daysSince').textContent = `${daysSince} days ago`;
  
  // Update charts
  updateCharts();
}

// Update charts
function updateCharts() {
  // Destroy existing charts
  Object.values(charts).forEach(chart => chart.destroy());
  charts = {};
  
  // Weekly frequency chart
  const weekMap = {};
  trainingData.forEach(d => {
    const date = new Date(d.date);
    const week = getWeekLabel(date);
    weekMap[week] = (weekMap[week] || 0) + 1;
  });
  
  const weekLabels = Object.keys(weekMap).sort();
  const weekData = weekLabels.map(w => weekMap[w]);
  
  const freqCtx = document.getElementById('frequencyChart').getContext('2d');
  charts.frequency = new Chart(freqCtx, {
    type: 'line',
    data: {
      labels: weekLabels,
      datasets: [{
        label: '週訓練次數',
        data: weekData,
        borderColor: '#00fff5',
        backgroundColor: 'rgba(0, 255, 245, 0.1)',
        borderWidth: 2,
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { 
          beginAtZero: true,
          grid: { color: 'rgba(255, 255, 255, 0.1)' },
          ticks: { color: '#8b9cb6' }
        },
        x: {
          grid: { color: 'rgba(255, 255, 255, 0.05)' },
          ticks: { color: '#8b9cb6' }
        }
      }
    }
  });
  
  // Volume chart — weekly volume by category
  const volWeekMap = {};
  trainingData.forEach(d => {
    const week = getWeekLabel(new Date(d.date));
    if (!volWeekMap[week]) volWeekMap[week] = {};
    volWeekMap[week][d.category] = (volWeekMap[week][d.category] || 0) + d.volume;
  });
  const volWeeks = Object.keys(volWeekMap).sort();
  const allCategories = [...new Set(trainingData.map(d => d.category))];
  const catColors = ['#9d4edd', '#00fff5', '#ff006e', '#ffd166', '#06d6a0', '#118ab2', '#ef476f', '#073b4c'];

  const volCtx = document.getElementById('volumeChart').getContext('2d');
  charts.volume = new Chart(volCtx, {
    type: 'bar',
    data: {
      labels: volWeeks,
      datasets: allCategories.map((cat, i) => ({
        label: cat,
        data: volWeeks.map(w => (volWeekMap[w] && volWeekMap[w][cat]) || 0),
        backgroundColor: catColors[i % catColors.length] + 'cc',
        borderColor: catColors[i % catColors.length],
        borderWidth: 1
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8b9cb6', font: { size: 11 } } }
      },
      scales: {
        x: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b9cb6' } },
        y: { stacked: true, beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8b9cb6' } }
      }
    }
  });

  // Muscle chart — map category to muscle group and sum sets
  const muscleMap = { 'BENCH_PRESS': '胸', 'CHEST': '胸', 'BACK': '背', 'ROW': '背', 'LAT': '背', 'PULL': '背', 'DEADLIFT': '背', 'SHOULDER': '肩', 'LATERAL': '肩', 'SQUAT': '腿', 'LEG': '腿', 'LUNGE': '腿', 'CALF': '腿', 'BICEP': '二頭', 'CURL': '二頭', 'TRICEP': '三頭', 'PUSHDOWN': '三頭', 'EXTENSION': '三頭', 'DIP': '三頭' };
  const muscleLabels = ['胸', '背', '肩', '腿', '二頭', '三頭'];
  const muscleSets = {};
  muscleLabels.forEach(m => muscleSets[m] = 0);

  trainingData.forEach(d => {
    const key = (d.category + ' ' + d.sub_category).toUpperCase();
    let matched = false;
    for (const [keyword, muscle] of Object.entries(muscleMap)) {
      if (key.includes(keyword)) { muscleSets[muscle] += d.sets; matched = true; break; }
    }
    if (!matched) muscleSets['胸'] += 0; // unmatched categories ignored
  });

  const muscleCtx = document.getElementById('muscleChart').getContext('2d');
  charts.muscle = new Chart(muscleCtx, {
    type: 'radar',
    data: {
      labels: muscleLabels,
      datasets: [{
        label: '總訓練組數',
        data: muscleLabels.map(m => muscleSets[m]),
        borderColor: '#ff006e',
        backgroundColor: 'rgba(255, 0, 110, 0.2)',
        borderWidth: 2,
        pointBackgroundColor: '#ff006e'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.1)' },
          angleLines: { color: 'rgba(255,255,255,0.1)' },
          pointLabels: { color: '#e8f4f8', font: { size: 14 } },
          ticks: { color: '#8b9cb6', backdropColor: 'transparent' }
        }
      }
    }
  });
}

function getWeekLabel(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

// Built-in Garmin data (auto-generated from /projects/garmin/cores/)
const GARMIN_CSV = `date,training,category,sub_category,sets,reps,max_weight_kg,volume_kg
2025-12-19,PPL-pull,CURL,EZ_BAR_PREACHER_CURL,2,20,18,360

2025-12-19,PPL-pull,LATERAL_RAISE,CABLE_DIAGONAL_RAISE,2,30,12,360

2025-12-19,PPL-pull,ROW,BARBELL_ROW,3,30,30,900

2026-01-08,PPL-push,SUSPENSION,Y_FLY,2,22,12.5,275

2026-01-09,PPL-pull,CURL,SEATED_ALTERNATING_DUMBBELL_BICEPS_CURL,1,5,12,60

2026-01-09,PPL-pull,ROW,BARBELL_ROW,3,24,40,960
2026-01-09,PPL-pull,ROW,V_GRIP_CABLE_ROW,2,15,30,450
2026-01-09,PPL-pull,SUSPENSION,FACE_PULL,2,25,21.5,537.5
2026-01-12,PPL-pull,CURL,EZ_BAR_PREACHER_CURL,1,10,14,140
