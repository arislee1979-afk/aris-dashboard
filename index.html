<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蝦群角色</title>
<style>
body{font-family:Arial,sans-serif;background:#0a1628;color:#e0e0e0;margin:0;padding:20px;text-align:center}
h1{color:#00d4ff;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:1200px;margin:0 auto}
.card{background:#1a2a44;border-radius:12px;padding:20px;box-shadow:0 4px 12px rgba(0,212,255,0.15)}
.card img{width:100%;max-width:250px;border-radius:8px;margin-bottom:15px}
.card h2{color:#00d4ff;font-size:1.3em;margin:10px 0}
.card p{color:#a0a0a0;font-size:0.95em}
footer{margin-top:40px;color:#666}
</style>
</head>
<body>
<h1>🦐 蝦群角色</h1>
<div class="grid">
<div class="card">
<img src="file_95.jpg" alt="系統蝦">
<h2>系統蝦</h2>
<p>主機管理、Vault 檔案、Cron 排程</p>
</div>
<div class="card">
<img src="file_96.jpg" alt="發財蝦">
<h2>發財蝦</h2>
<p>商業分析、數據洞察、投資建議</p>
</div>
<div class="card">
<img src="file_97.jpg" alt="健康蝦">
<h2>健康蝦</h2>
<p>健康追蹤、Garmin 數據、生活優化</p>
</div>
</div>
<footer>蝦群系統 v2.0 | Powered by Claude Code</footer>
</body>
</html>
