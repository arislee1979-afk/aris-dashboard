<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蝦群帝國 | Shrimp Empire - Cyberpunk Chronicles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff00ff;
            --neon-gold: #ffd700;
            --neon-purple: #9d00ff;
            --neon-blue: #0080ff;
            --bg-dark: #05080f;
            --bg-card: rgba(10, 20, 40, 0.8);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
        }
        
        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 9999;
        }
        
        /* Glitch animation */
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(-1px, 2px); }
            98% { transform: translate(1px, -2px); }
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            75% { opacity: 0.95; }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan); }
            50% { box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-cyan), 0 0 80px var(--neon-cyan); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 4px var(--neon-cyan),
                    0 0 11px var(--neon-cyan),
                    0 0 19px var(--neon-cyan),
                    0 0 40px var(--neon-cyan);
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }
        
        .fade-in {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            background: rgba(5, 8, 15, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
        }
        
        nav .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 3px;
        }
        
        nav .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        nav .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
        }
        
        nav .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            transition: width 0.3s;
        }
        
        nav .nav-links a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        
        nav .nav-links a:hover::after {
            width: 100%;
        }
        
        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 100px 20px;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(157, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 0, 255, 0.1) 0%, transparent 60%),
                var(--bg-dark);
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-pink), var(--neon-gold), transparent);
            animation: scan 3s linear infinite;
        }
        
        .hero-badge {
            display: inline-block;
            padding: 8px 25px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            margin-bottom: 30px;
            animation: flicker 2s infinite;
        }
        
        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            letter-spacing: 10px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch 5s infinite, neonFlicker 3s infinite;
            position: relative;
        }
        
        .hero h1::before {
            content: '蝦群帝國';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.5;
            animation: glitch 3s infinite reverse;
        }
        
        .hero .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--neon-gold);
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px var(--neon-gold);
        }
        
        .hero .motto {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 50px;
            max-width: 700px;
            line-height: 2;
        }
        
        .hero .motto span {
            display: block;
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .hero-cta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            font-family: 'Noto Sans TC', sans-serif;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.8);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 0, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
        }
        
        .scroll-indicator {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            animation: float 2s ease-in-out infinite;
        }
        
        .scroll-indicator span {
            display: block;
            width: 30px;
            height: 50px;
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            position: relative;
        }
        
        .scroll-indicator span::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: scroll-dot 2s infinite;
        }
        
        @keyframes scroll-dot {
            0% { top: 10px; opacity: 1; }
            100% { top: 30px; opacity: 0; }
        }
        
        /* Section styling */
        section {
            padding: 100px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .section-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }
        
        .section-header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
        }
        
        .section-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 20px auto 0;
        }
        
        /* Manifesto Section */
        .manifesto {
            background: linear-gradient(180deg, var(--bg-dark), rgba(157, 0, 255, 0.05), var(--bg-dark));
            position: relative;
        }
        
        .manifesto-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        
        .manifesto-quote {
            font-size: 2rem;
            font-style: italic;
            color: var(--neon-gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 40px;
            line-height: 1.8;
            position: relative;
            padding: 40px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.05);
        }
        
        .manifesto-quote::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 5rem;
            color: var(--neon-gold);
            opacity: 0.3;
            font-family: serif;
        }
        
        .manifesto-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 2.2;
            text-align: justify;
        }
        
        .manifesto-text p {
            margin-bottom: 20px;
        }
        
        .manifesto-highlight {
            color: var(--neon-cyan);
            font-weight: 700;
        }
        
        /* Character Cards */
        .characters {
            background: linear-gradient(180deg, var(--bg-dark), rgba(0, 240, 255, 0.03), var(--bg-dark));
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 0 20px;
        }
        
        .character-card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 15px;
